  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00D4FF; --bg: #050A0F; --bg-card: #0A1628;
      --text: #E8F4FD; --text-muted: #7A9BB5; --border: rgba(0,212,255,0.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 450px; }
    .logo { text-align: center; margin-bottom: 2rem; font-size: 1.5rem; font-weight: 900; text-decoration: none; color: white; display: block; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
    input { width: 100%; padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: white; }
    .btn-auth { width: 100%; background: var(--primary); color: var(--bg); padding: 1rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .switch-auth { text-align: center; margin-top: 1.5rem; color: var(--text-muted); }
    .switch-auth a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <a href="index.html" class="logo">🧠 Mind<span>Weave</span></a>
    <h2 style="text-align: center; margin-bottom: 2rem;">تسجيل الدخول</h2>
    <form id="loginForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" required placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-auth">دخول</button>
    </form>
    <div class="switch-auth">
      ليس لديك حساب؟ <a href="signup.html">أنشئ حساب</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const result = await signInUser(email, password);
      if (result.success) {
        window.location.href = 'index.html';
      } else {
        alert('خطأ: ' + result.message);
      }
    });
  </script>
</body>
