<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MindWeave - Global AI Platform for prompts and digital products">
<title>MindWeave | Mind meets AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ GLOBAL RESET & VARIABLES ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #7C3AED;
  --primary-light: #8B5CF6;
  --primary-dark: #5B21B6;
  --accent: #06B6D4;
  --accent2: #F59E0B;
  --accent3: #10B981;
  --bg-dark: #050508;
  --bg-card: #0D0D1A;
  --bg-card2: #111124;
  --border: rgba(124,58,237,0.2);
  --border-light: rgba(124,58,237,0.1);
  --text: #F1F0FF;
  --text-muted: #8B8BAD;
  --text-dim: #5A5A7A;
  --glow: rgba(124,58,237,0.4);
  --glow-cyan: rgba(6,182,212,0.3);
  --font-ar: 'Cairo', sans-serif;
  --font-en: 'Space Grotesk', sans-serif;
  --radius: 16px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 40px rgba(124,58,237,0.15);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-dark: #f5f5f7;
  --bg-card: #ffffff;
  --bg-card2: #f0f0f5;
  --text: #1a1a2e;
  --text-muted: #6b6b80;
  --text-dim: #9999aa;
  --border: rgba(124,58,237,0.15);
  --border-light: rgba(124,58,237,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-ar);
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
  transition: background-color 0.3s, color 0.3s;
}
body.en { direction: ltr; font-family: var(--font-en); }
body.en [data-lang="ar"], body.en [data-lang="fr"], body.en [data-lang="es"] { display: none !important; }
body:not(.en) [data-lang="en"] { display: none !important; }

/* Animated Background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(245,158,11,0.03) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

/* Header */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 0;
  transition: var(--transition);
}
header.scrolled {
  background: rgba(5,5,8,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 4px 30px rgba(0,0,0,0.3);
}
[data-theme="light"] header.scrolled { background: rgba(255,255,255,0.95); }

nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1300px;
  margin: 0 auto;
  padding: 1.2rem 2rem;
  gap: 1rem;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: 0 0 20px var(--glow);
  transition: transform 0.3s;
}
.logo:hover .logo-icon { transform: rotate(10deg) scale(1.1); }
.logo-text {
  font-size: 1.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff 30%, var(--primary-light));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 0.5rem;
  align-items: center;
}
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  transition: var(--transition);
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 20px;
  height: 2px;
  background: var(--primary);
  transition: transform 0.3s;
}
.nav-links a:hover { color: var(--text); background: var(--border-light); }
.nav-links a:hover::after { transform: translateX(-50%) scaleX(1); }
.nav-links a.active { color: var(--primary-light); }

.nav-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* Theme Toggle */
.theme-toggle {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.theme-toggle:hover { border-color: var(--primary); color: var(--primary-light); transform: rotate(15deg); }

/* Language Dropdown */
.lang-dropdown { position: relative; }
.lang-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 7px 14px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: inherit;
  transition: var(--transition);
}
.lang-btn:hover { border-color: var(--primary); color: var(--text); }
.lang-menu {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: auto;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px;
  display: none;
  min-width: 140px;
  z-index: 200;
  box-shadow: var(--shadow);
}
body.en .lang-menu { left: auto; right: 0; }
.lang-menu.open { display: block; animation: fadeDown 0.2s ease; }
.lang-menu button {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 6px;
  font-size: 0.85rem;
  font-family: inherit;
  transition: var(--transition);
}
.lang-menu button:hover { background: var(--border-light); color: var(--text); }
.lang-menu button.active-lang { color: var(--primary-light); background: rgba(124,58,237,0.1); }

@keyframes fadeDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* Cart Button */
.cart-btn {
  position: relative;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: var(--transition);
  font-size: 0.95rem;
}
.cart-btn:hover { border-color: var(--primary); color: var(--text); background: var(--border-light); transform: translateY(-2px); }
.cart-badge {
  position: absolute;
  top: -6px;
  right: -6px;
  background: var(--primary);
  color: white;
  font-size: 11px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  animation: pulse 2s ease infinite;
}
body.en .cart-badge { right: auto; left: -6px; }

.btn-try {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  padding: 9px 20px;
  border-radius: 30px;
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 600;
  transition: var(--transition);
  white-space: nowrap;
  border: none;
  cursor: pointer;
}

.btn-try:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow); }

/* Hamburger Menu */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.hamburger span {
  width: 22px;
  height: 2px;
  background: var(--text-muted);
  border-radius: 2px;
  transition: var(--transition);
}
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

/* Mobile Nav */
.mobile-nav {
  position: fixed;
  inset: 0;
  background: rgba(5,5,8,0.98);
  backdrop-filter: blur(20px);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.mobile-nav.open { transform: translateX(0); }
.mobile-nav a {
  color: var(--text);
  text-decoration: none;
  font-size: 1.5rem;
  font-weight: 700;
  transition: var(--transition);
  opacity: 0;
  transform: translateY(20px);
}
.mobile-nav.open a { opacity: 1; transform: translateY(0); transition-delay: calc(var(--i) * 0.1s); }
.mobile-nav a:hover { color: var(--primary-light); }
.mobile-nav-close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.4rem;
  cursor: pointer;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
body.en .mobile-nav-close { right: auto; left: 1.5rem; }

/* Hero Section */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 8rem 2rem 4rem;
  z-index: 1;
}
.hero-bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 80%);
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(60px); } }

.hero-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  animation: float 8s ease-in-out infinite;
}
.hero-orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%); top: 10%; left: 5%; }
.hero-orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(6,182,212,0.1), transparent 70%); bottom: 10%; right: 5%; animation-delay: -3s; }
.hero-orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(245,158,11,0.08), transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -6s; }

@keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }

.hero-content {
  max-width: 900px;
  text-align: center;
  position: relative;
  z-index: 2;
  animation: heroReveal 1s ease forwards;
}
@keyframes heroReveal { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(124,58,237,0.12);
  border: 1px solid rgba(124,58,237,0.3);
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 0.85rem;
  color: var(--primary-light);
  margin-bottom: 2rem;
}
.hero-tag-dot { width: 6px; height: 6px; background: var(--accent3); border-radius: 50%; animation: pulse 2s ease infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

.hero h1 {
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -2px;
  margin-bottom: 1.5rem;
}
.hero-word-1 { color: var(--text); }
.hero-word-2 {
  background: linear-gradient(135deg, var(--primary-light), var(--accent), var(--accent2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: block;
}
.hero p {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto 2.5rem;
  line-height: 1.8;
}
.hero-cta {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 4rem;
}
.btn-primary, .btn-secondary {
  padding: 14px 32px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.95rem;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  box-shadow: 0 4px 20px var(--glow);
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  opacity: 0;
  transition: opacity 0.3s;
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 30px var(--glow); }
.btn-primary:hover::before { opacity: 1; }
.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
}
.btn-secondary:hover { border-color: var(--primary); background: var(--border-light); transform: translateY(-2px); }

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 2rem;
  flex-wrap: wrap;
}
.hero-stat {
  text-align: center;
  padding: 1.5rem 2rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  backdrop-filter: blur(10px);
  transition: var(--transition);
}
.hero-stat:hover { border-color: var(--primary); transform: translateY(-4px) scale(1.02); }
.hero-stat-num {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--text), var(--primary-light));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: block;
}
.hero-stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }

/* Scroll Indicator */
.scroll-indicator {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  font-size: 0.75rem;
  animation: bounce 2s ease infinite;
}
@keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-10px); } }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--primary), transparent); animation: scrollLine 2s ease infinite; }
@keyframes scrollLine { 0%, 100% { scaleY: 0.5; opacity: 0.5; } 50% { scaleY: 1; opacity: 1; } }

/* Sections */
section { position: relative; z-index: 1; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
.section-header { text-align: center; margin-bottom: 3.5rem; }
.section-tag {
  display: inline-block;
  background: rgba(124,58,237,0.1);
  border: 1px solid var(--border);
  color: var(--primary-light);
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 1rem;
  text-transform: uppercase;
}
.section-title { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.2; margin-bottom: 1rem; }

/* Marquee */
.marquee-section {
  padding: 1.5rem 0;
  border-top: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
  overflow: hidden;
  background: rgba(124,58,237,0.03);
}
.marquee-track {
  display: flex;
  gap: 0;
  animation: marquee 30s linear infinite;
  white-space: nowrap;
}
.marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 2rem;
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 500;
  white-space: nowrap;
}
.marquee-item span { color: var(--primary-light); }
.marquee-dot { color: var(--primary); opacity: 0.4; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* Categories */
.categories-section { padding: 5rem 0; }
.categories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
}
.cat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 1.5rem;
  text-align: center;
  text-decoration: none;
  color: var(--text);
  transition: var(--transition);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.cat-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  opacity: 0;
  transition: var(--transition);
}
.cat-card:hover { border-color: var(--primary); transform: translateY(-6px) scale(1.02); box-shadow: var(--shadow-glow); }
.cat-card:hover::before { opacity: 0.06; }
.cat-card:hover .cat-icon { transform: scale(1.2) rotate(5deg); }
.cat-icon { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; position: relative; z-index: 1; transition: transform 0.3s; }
.cat-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; position: relative; z-index: 1; }
.cat-count { font-size: 0.75rem; color: var(--text-muted); position: relative; z-index: 1; }

/* Products */
.products-section { padding: 5rem 0; }
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}
.product-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 1.5rem;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.product-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transition: transform 0.3s ease;
}
.product-card:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: 0 20px 50px rgba(0,0,0,0.4), var(--shadow-glow); }
.product-card:hover::after { transform: scaleX(1); }
.product-badge-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
}
.badge-hot { background: rgba(239,68,68,0.15); color: #F87171; border: 1px solid rgba(239,68,68,0.2); }
.badge-new { background: rgba(16,185,129,0.15); color: #34D399; border: 1px solid rgba(16,185,129,0.2); }
.badge-pro { background: rgba(245,158,11,0.15); color: #FCD34D; border: 1px solid rgba(245,158,11,0.2); }
.badge-sale { background: rgba(124,58,237,0.15); color: var(--primary-light); border: 1px solid var(--border); }
.product-icon-wrap {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.1));
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 1rem;
  transition: transform 0.3s;
}
.product-card:hover .product-icon-wrap { transform: scale(1.1) rotate(-5deg); }
.product-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
.product-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1rem; flex: 1; }
.product-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.product-tag {
  background: var(--bg-card2);
  border: 1px solid var(--border-light);
  color: var(--text-muted);
  font-size: 0.7rem;
  padding: 3px 10px;
  border-radius: 20px;
}
.product-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 1rem;
  border-top: 1px solid var(--border-light);
}
