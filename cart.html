<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>سلة التسوق | MindWeave</title><link rel="stylesheet" href="css/style.css"><style>.page-header{padding:120px 0 40px;text-align:center}.cart-item{display:flex;justify-content:space-between;background:#1A1A2E;padding:1rem;margin:1rem 0;border-radius:15px}.cart-total{font-size:1.5rem;margin-top:2rem;text-align:center}.btn-checkout{background:#6C5CE7;color:white;padding:12px 30px;border-radius:50px;text-decoration:none;display:inline-block;margin-top:1rem}</style></head>
<body><header><nav><div class="logo"><a href="index.html">🧠 MindWeave</a></div><ul><li><a href="index.html">الرئيسية</a></li><li><a href="library.html">المكتبة</a></li><li><a href="store.html">المتجر</a></li><li><a href="about.html">من نحن</a></li><li><a href="contact.html">اتصل بنا</a></li></ul></nav></header>
<main><section class="page-header"><h1>سلة التسوق</h1></section>
<div class="container" id="cartContainer"><p>سلة التسوق فارغة</p></div></main>
<footer><div class="container"><p>© 2026 MindWeave</p></div></footer>
<script>let cart=JSON.parse(localStorage.getItem('cart'))||[];if(cart.length){let html='';let total=0;cart.forEach(item=>{total+=item.price*item.quantity;html+=`<div class="cart-item"><span>${item.name}</span><span>${item.quantity} × $${item.price}</span></div>`;});html+=`<div class="cart-total">الإجمالي: $${total}</div><a href="checkout.html" class="btn-checkout">إتمام الطلب</a>`;document.getElementById('cartContainer').innerHTML=html;}else{document.getElementById('cartContainer').innerHTML='<p>سلة التسوق فارغة</p>';}</script></body></html>
