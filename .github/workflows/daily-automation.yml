name: Daily AI Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for automation'
        required: true
        default: 'الذكاء الاصطناعي والتسويق'
      mode:
        description: 'Automation mode'
        required: true
        default: 'daily-automation'
        type: choice
        options:
          - daily-automation
          - social-campaign
          - customer-service

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
  OLLAMA_BASE_URL: http://localhost:11434
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY || '' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || '' }}

jobs:
  daily-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "Warning: requirements.txt not found"
            pip install groq
          fi
      
      - name: Start Ollama service
        run: |
          docker run -d \
            --name ollama-daily-${{ github.run_id }} \
            -p 11434:11434 \
            ollama/ollama:latest
          
          # انتظر بدء الخدمة
          sleep 10
          
          # تحقق من أن الخدمة تعمل
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done
          
          # اسحب نموذج llama3
          docker exec ollama-daily-${{ github.run_id }} ollama pull llama3 || echo "Could not pull llama3"
      
      - name: Run Daily AI Automation
        run: |
          python3 mindweave_ai_agent.py \
            --mode daily-automation \
            --topic "${{ github.event.inputs.topic || 'الذكاء الاصطناعي' }}"
        env:
          OLLAMA_BASE_URL: http://localhost:11434
      
      - name: Commit and push generated content
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "AI Automation: Generated daily content - $(date +'%Y-%m-%d')"
            git push
          fi
        continue-on-error: true
      
      - name: Clean up Docker
        if: always()
        run: |
          docker rm -f ollama-daily-${{ github.run_id }} || true

  social-campaign:
