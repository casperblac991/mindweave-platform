name: Daily AI Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for automation'
        required: true
        default: 'الذكاء الاصطناعي والتسويق'
      mode:
        description: 'Automation mode'
        required: true
        default: 'daily-automation'
        type: choice
        options:
          - daily-automation
          - social-campaign
          - customer-service

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
  OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL || '' }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY || '' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || '' }}

jobs:
  daily-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      
      - name: Start Ollama
        run: |
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          sleep 30
          docker exec ollama ollama pull llama3 || true
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install groq
      
      - name: Run Daily AI Automation
        run: |
          export OLLAMA_BASE_URL=http://localhost:11434
          python3 mindweave_ai_agent.py --mode daily-automation "${{ github.event.inputs.topic || 'الذكاء الاصطناعي' }}"
          
      - name: Commit generated content
        run: |
          git config --local user.email "openhands@all-hands.dev"
          git config --local user.name "openhands"
          git add -A
          git diff --staged --quiet || git commit -m "AI Automation: Generated new content"
          git push
        continue-on-error: true

  social-campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      
      - name: Start Ollama
        run: |
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          sleep 30
          docker exec ollama ollama pull llama3 || true
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install groq
      
      - name: Run Social Campaign
        run: |
          export OLLAMA_BASE_URL=http://localhost:11434
          python3 mindweave_ai_agent.py --mode social-campaign "${{ github.event.inputs.topic || 'منتج جديد' }}" "تعلم أسرع"
          
      - name: Commit generated content
        run: |
          git config --local user.email "openhands@all-hands.dev"
          git config --local user.name "openhands"
          git add -A
          git diff --staged --quiet || git commit -m "AI Social Campaign"
          git push
        continue-on-error: true

  customer-service:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      
      - name: Start Ollama
        run: |
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          sleep 30
          docker exec ollama ollama pull llama3 || true
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install groq
      
      - name: Generate Signup Content
        run: |
          export OLLAMA_BASE_URL=http://localhost:11434
          python3 mindweave_ai_agent.py --mode generate-signup
