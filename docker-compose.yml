# ============================================
# MindWeave Platform - Docker Configuration
# ============================================

version: '3.8'

services:
  # ========== Frontend (Node.js Static Server) ==========
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npx serve -l 3000"
    networks:
      - mindweave-network

  # ========== Backend (FastAPI) ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    volumes:
      - ./backend:/app
    networks:
      - mindweave-network
    depends_on:
      - frontend

  # ========== Database (Supabase - uses external service) ==========
  # Note: MindWeave uses Supabase cloud database
  # No local PostgreSQL needed - Supabase handles it

networks:
  mindweave-network:
    driver: bridge