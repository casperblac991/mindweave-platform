<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Lab | MindWeave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00D4FF; --bg: #050A0F; --bg-card: #0A1628;
      --text: #E8F4FD; --text-muted: #7A9BB5; --border: rgba(0,212,255,0.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; line-height: 1.6; }
    nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 70px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 900; color: var(--text); text-decoration: none; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #7C3AED); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    main { max-width: 1000px; margin: 0 auto; padding: 120px 2rem 4rem; }
    .lab-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; }
    .lab-header { margin-bottom: 2rem; text-align: center; }
    .lab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 768px) { .lab-grid { grid-template-columns: 1fr; } }
    .input-area, .output-area { display: flex; flex-direction: column; gap: 1rem; }
    textarea { width: 100%; height: 200px; padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: white; font-family: inherit; resize: none; }
    .output-box { width: 100%; height: 200px; padding: 1rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; color: var(--text-muted); overflow-y: auto; }
    .btn-generate { background: var(--primary); color: var(--bg); padding: 1rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .actions { display: flex; gap: 1rem; }
    .btn-action { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><div class="logo-icon">🧠</div>Mind<span>Weave</span></a>
  </nav>

  <main>
    <div class="lab-container">
      <div class="lab-header">
        <h1>Prompt Lab ✨</h1>
        <p>قم بتوليد وتحسين أوامر الذكاء الاصطناعي الخاصة بك</p>
      </div>

      <div class="lab-grid">
        <div class="input-area">
          <h3>📝 وصف احتياجك</h3>
          <textarea id="labInput" placeholder="اكتب ما تريد أن يفعله الذكاء الاصطناعي..."></textarea>
          <button class="btn-generate" onclick="generate()">⚡ توليد أمر احترافي</button>
        </div>
        <div class="output-area">
          <h3>🤖 الأمر المُولَّد</h3>
          <div class="output-box" id="labOutput">سيظهر الأمر هنا...</div>
          <div class="actions">
            <button class="btn-action">📋 نسخ</button>
            <button class="btn-action">💾 حفظ</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function generate() {
      const input = document.getElementById('labInput').value;
      const output = document.getElementById('labOutput');
      if (!input) return;
      output.innerText = "جاري التوليد...";
      setTimeout(() => {
        output.innerText = "هذا أمر احترافي تم توليده بناءً على: " + input + "\n\nسياق: أنت خبير في...\nمهمة: قم بـ...\nقيود: تجنب...";
        output.style.color = "white";
      }, 1000);
    }
  </script>
</body>
</html>
