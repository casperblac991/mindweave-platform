<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Lab | MindWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #00D4FF;
  --accent: #7C3AED;
  --bg: #050A0F;
  --bg-card: #0A1628;
  --text: #E8F4FD;
  --text-muted: #7A9BB5;
  --border: rgba(0,212,255,0.2);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(5, 10, 15, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 1000;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--text);
  text-decoration: none;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo span { color: var(--primary); }
.nav-links { display: flex; gap: 0.5rem; list-style: none; }
.nav-links a { color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; }
.nav-links a:hover, .nav-links a.active { color: var(--primary); background: rgba(0, 212, 255, 0.1); }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  padding: 0.6rem 1.5rem;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
}
main { max-width: 1200px; margin: 0 auto; padding: 100px 2rem 4rem; }
.hero { text-align: center; margin-bottom: 3rem; }
.hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
.hero h1 .gradient { background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.hero p { color: var(--text-muted); }
.prompt-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2rem;
}
textarea {
  width: 100%;
  height: 150px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  color: var(--text);
  font-family: inherit;
  margin: 1rem 0;
}
button {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  border: none;
  padding: 0.8rem 2rem;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}
.output {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  margin-top: 1rem;
  min-height: 150px;
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><div class="logo-icon">🧠</div>Mind<span>Weave</span></a>
  <ul class="nav-links">
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="store.html">المتجر</a></li>
    <li><a href="library.html">المكتبة المجانية</a></li>
    <li><a href="prompt-lab.html" class="active">Prompt Lab ✨</a></li>
    <li><a href="creators.html">برنامج المبدعين</a></li>
  </ul>
  <a href="cart.html" class="btn-primary">🛒 السلة</a>
</nav>
<main>
  <div class="hero">
    <h1>⚗️ Prompt <span class="gradient">Lab</span></h1>
    <p>جرّب وأنشئ أوامر AI احترافية مجاناً</p>
  </div>
  <div class="prompt-container">
    <h3>📝 وصف احتياجك</h3>
    <textarea id="promptInput" placeholder="مثال: أريد أمر لإنشاء محتوى تسويقي لمتجر إلكتروني يبيع عطوراً فاخرة..."></textarea>
    <button onclick="generatePrompt()">⚡ توليد أمر احترافي</button>
    <div class="output" id="promptOutput">سيظهر الأمر المُولَّد هنا...</div>
  </div>
</main>
<script>
function generatePrompt() {
  const input = document.getElementById('promptInput').value;
  const output = document.getElementById('promptOutput');
  if (!input.trim()) {
    output.innerHTML = '⚠️ الرجاء إدخال وصف لاحتياجك أولاً';
    return;
  }
  output.innerHTML = `✨ أمر احترافي: "قم بإنشاء محتوى تسويقي جذاب بالعربية حول "${input}" مع إحصائيات دقيقة ونصائح عملية، مع استخدام لغة تحفيزية وأسلوب مقنع."`;
}
</script>
</body>
</html>
