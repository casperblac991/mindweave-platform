<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تواصل معنا | MindWeave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00D4FF; --bg: #050A0F; --bg-card: #0A1628;
      --text: #E8F4FD; --text-muted: #7A9BB5; --border: rgba(0,212,255,0.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; line-height: 1.6; }
    nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 70px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 900; color: var(--text); text-decoration: none; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #7C3AED); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    main { max-width: 600px; margin: 0 auto; padding: 120px 2rem 4rem; }
    .contact-form { background: var(--bg-card); border: 1px solid var(--border); padding: 2.5rem; border-radius: 24px; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
    input, textarea { width: 100%; padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: white; font-family: inherit; }
    .btn-submit { width: 100%; background: var(--primary); color: var(--bg); padding: 1rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><div class="logo-icon">🧠</div>Mind<span>Weave</span></a>
  </nav>

  <main>
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1>تواصل معنا</h1>
      <p>يسعدنا سماع استفساراتك واقتراحاتك</p>
    </div>

    <form class="contact-form">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" placeholder="أدخل اسمك هنا">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label>الرسالة</label>
        <textarea rows="5" placeholder="كيف يمكننا مساعدتك؟"></textarea>
      </div>
      <button type="submit" class="btn-submit">إرسال الرسالة</button>
    </form>
  </main>
</body>
</html>
