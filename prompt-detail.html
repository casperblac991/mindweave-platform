<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل الأمر | MindWeave</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
.lang-switch{background:#1A1A2E;border:1px solid #6C5CE7;padding:6px 12px;border-radius:30px;cursor:pointer;color:white}
.lang-switch:hover{background:#6C5CE7}
[data-lang="en"]{display:none}
body.en [data-lang="ar"]{display:none}
body.en [data-lang="en"]{display:block}
body.en{direction:ltr;text-align:left}
body:not(.en){direction:rtl;text-align:right}
.page-header{padding:120px 0 40px;text-align:center;background:linear-gradient(135deg,#0A0A0F,#1A1A2E)}
.prompt-detail{max-width:800px;margin:auto;padding:2rem;background:#1A1A2E;border-radius:20px}
.prompt-box{background:#0A0A0F;padding:1.5rem;border-radius:15px;margin:1rem 0;border:1px solid #6C5CE7}
.copy-btn{background:#6C5CE7;color:white;border:none;padding:10px 20px;border-radius:30px;cursor:pointer}
</style>
</head>
<body>
<header><nav><div class="logo"><a href="index.html">🧠 MindWeave</a></div>
<ul><li><a href="index.html" data-lang="ar">الرئيسية</a><a href="index.html" data-lang="en">Home</a></li>
<li><a href="library.html" data-lang="ar">المكتبة</a><a href="library.html" data-lang="en">Library</a></li>
<li><a href="blog.html" data-lang="ar">المدونة</a><a href="blog.html" data-lang="en">Blog</a></li>
<li><a href="store.html" data-lang="ar">المتجر</a><a href="store.html" data-lang="en">Store</a></li></ul>
<button class="lang-switch" onclick="toggleLanguage()" id="langBtn">English</button></nav></header>
<main><section class="page-header"><div class="container"><h1 id="titleAr"></h1><h1 id="titleEn" style="display:none"></h1></div></section>
<div class="prompt-detail"><div class="prompt-box"><div id="promptAr"></div><div id="promptEn" style="display:none"></div><button class="copy-btn" onclick="copyPrompt()">📋 نسخ الأمر</button></div><div id="explanationAr"></div><div id="explanationEn" style="display:none"></div></div></main>
<footer><div class="container"><p>© 2026 MindWeave</p></div></footer>
<script>
const prompts = {
1: { titleAr: "📝 خطة تسويق متكاملة", titleEn: "📝 Complete Marketing Plan", 
   textAr: "اكتب لي خطة تسويق كاملة لمنتج جديد في مجال [مجالك]، تشمل التحليل الرباعي SWOT، استراتيجيات التسويق الرقمي، والميزانية التقديرية.", 
   textEn: "Write a complete marketing plan for a new product in [your field], including SWOT analysis, digital marketing strategies, and estimated budget.",
   explanationAr: "<h2>📖 شرح الأمر:</h2><p>هذا الأمر يطلب من ChatGPT إعداد خطة تسويق متكاملة. يشمل التحليل الرباعي (SWOT) وتحليل المنافسين واستراتيجيات التسويق.</p><h2>💡 نصائح:</h2><ul><li>استبدل [مجالك] بمجال المنتج الفعلي</li><li>أضف تفاصيل أكثر عن المنتج للحصول على نتائج أدق</li><li>اطلب تعديلات محددة بعد الحصول على الخطة الأولى</li></ul><h2>📊 مثال عملي:</h2><p>إذا كنت تخطط لتسويق تطبيق تعليمي، أضف: 'الجمهور المستهدف: طلاب الجامعات، الميزانية: 5000 دولار'</p>",
   explanationEn: "<h2>📖 Explanation:</h2><p>This prompt asks ChatGPT to create a complete marketing plan. Includes SWOT analysis and marketing strategies.</p><h2>💡 Tips:</h2><ul><li>Replace [your field] with the actual product category</li><li>Add more product details for better results</li><li>Request specific revisions after the first draft</li></ul><h2>📊 Example:</h2><p>If marketing an educational app, add: 'Target audience: university students, budget: $5000'</p>" },
2: { titleAr: "📱 منشورات إنستغرام", titleEn: "📱 Instagram Posts", 
   textAr: "اكتب 10 منشورات إعلانية جذابة لـ Instagram لمنتج [اسم المنتج]، مع استخدام هاشتاجات مناسبة لكل منشور.", 
   textEn: "Write 10 attractive Instagram ad posts for [product name], with relevant hashtags for each post.",
   explanationAr: "<h2>📖 شرح الأمر:</h2><p>هذا الأمر يولد 10 منشورات إعلانية متنوعة لإنستغرام. كل منشور له أسلوب مختلف وهاشتاجات مخصصة.</p><h2>💡 نصائح:</h2><ul><li>حدد نوع المنتج بدقة (ملابس، إلكترونيات، خدمة)</li><li>أضف 'بأسلوب غير بيعي' إذا كنت تريد محتوى تسويقي ناعم</li><li>اطلب منشورات لستوري إنستغرام أيضًا</li></ul>",
   explanationEn: "<h2>📖 Explanation:</h2><p>This prompt generates 10 diverse Instagram ad posts. Each post has a different style and custom hashtags.</p><h2>💡 Tips:</h2><ul><li>Specify product type accurately (clothing, electronics, service)</li><li>Add 'non-salesy style' for soft marketing content</li><li>Also request Instagram Story posts</li></ul>" },
3: { titleAr: "📄 سيرة ذاتية احترافية", titleEn: "📄 Professional Resume", 
   textAr: "اكتب لي سيرة ذاتية احترافية لوظيفة [المسمى الوظيفي]، تشمل الخبرات السابقة والمهارات والتعليم. أضف أيضًا قسمًا للمشاريع والإنجازات.", 
   textEn: "Write a professional resume for [job title], including previous experience, skills, and education. Also add a section for projects and achievements.",
   explanationAr: "<h2>📖 شرح الأمر:</h2><p>هذا الأمر يكتب سيرة ذاتية احترافية مناسبة لسوق العمل. يركز على الخبرات والمهارات ذات الصلة بالوظيفة.</p><h2>💡 نصائح:</h2><ul><li>أضف تفاصيل عن خبراتك السابقة للحصول على نتائج مخصصة</li><li>اطلب تنسيقًا معينًا (ملخص، نقاط، جدول)</li><li>يمكنك طلب نسختين: واحدة عربية وأخرى إنجليزية</li></ul>",
   explanationEn: "<h2>📖 Explanation:</h2><p>This prompt writes a professional resume tailored to the job market.</p><h2>💡 Tips:</h2><ul><li>Add details about your previous experience for customized results</li><li>Request a specific format (summary, bullet points, table)</li><li>Ask for two versions: Arabic and English</li></ul>" },
4: { titleAr: "🏢 خطة عمل كاملة", titleEn: "🏢 Complete Business Plan", 
   textAr: "اكتب لي خطة عمل كاملة لشركة ناشئة في مجال [المجال]، تشمل ملخص تنفيذي، تحليل السوق، الخطة التشغيلية، الخطة المالية، وخطة التسويق.", 
   textEn: "Write a complete business plan for a startup in [field], including executive summary, market analysis, operational plan, financial plan, and marketing plan.",
   explanationAr: "<h2>📖 شرح الأمر:</h2><p>هذا الأمر يكتب خطة عمل متكاملة للشركات الناشئة. يغطي جميع الجوانب الأساسية المطلوبة للمستثمرين.</p><h2>💡 نصائح:</h2><ul><li>أضف تفاصيل عن رأس المال المتوقع والمدة الزمنية</li><li>اطلب تضمين تحليل المنافسين الرئيسيين</li><li>يمكنك طلب خطة مختصرة (صفحة واحدة) أو مفصلة</li></ul>",
   explanationEn: "<h2>📖 Explanation:</h2><p>This prompt writes a complete business plan for startups. Covers all essential aspects required for investors.</p><h2>💡 Tips:</h2><ul><li>Add details about expected capital and timeline</li><li>Request inclusion of main competitor analysis</li><li>Ask for a one-page executive summary or detailed version</li></ul>" },
5: { titleAr: "💰 إعلانات فيسبوك", titleEn: "💰 Facebook Ads", 
   textAr: "اكتب 5 نصوص إعلانية لفيسبوك لمنتج [اسم المنتج]، مع عناوين جذابة وأوصاف مقنعة ودعوة للشراء.", 
   textEn: "Write 5 Facebook ad copies for [product name], with catchy headlines, compelling descriptions, and a call to action.",
   explanationAr: "<h2>📖 شرح الأمر:</h2><p>ينشئ نصوص إعلانية جاهزة لحملات فيسبوك. مناسب للتسويق الرقمي وزيادة المبيعات.</p><h2>💡 نصائح:</h2><ul><li>حدد الجمهور المستهدف (عمر، اهتمامات)</li><li>أضف 'للتوعية' أو 'للمبيعات' حسب هدف الحملة</li><li>اطلب نسخ مختلفة لاختبار A/B</li></ul>",
   explanationEn: "<h2>📖 Explanation:</h2><p>Creates ready-to-use ad copies for Facebook campaigns. Suitable for digital marketing and increasing sales.</p><h2>💡 Tips:</h2><ul><li>Specify the target audience (age, interests)</li><li>Add 'for awareness' or 'for sales' based on campaign goal</li><li>Request different versions for A/B testing</li></ul>" }
};
for(let i=6;i<=500;i++){
    let cat = i%2===0 ? "chatgpt" : "midjourney";
    prompts[i] = { 
        titleAr: cat==="chatgpt" ? `💬 أمر ChatGPT رقم ${i}` : `🎨 أمر Midjourney رقم ${i}`, 
        titleEn: cat==="chatgpt" ? `💬 ChatGPT Prompt #${i}` : `🎨 Midjourney Prompt #${i}`,
        textAr: cat==="chatgpt" ? `اكتب لي محتوى احترافي عن موضوع [الموضوع] مع تفاصيل دقيقة وأمثلة عملية.` : `/imagine prompt creative design for [الموضوع], high quality, detailed, professional lighting, 8k --v 6`,
        textEn: cat==="chatgpt" ? `Write professional content about [topic] with precise details and practical examples.` : `/imagine prompt creative design for [topic], high quality, detailed, professional lighting, 8k --v 6`,
        explanationAr: `<h2>📖 شرح الأمر:</h2><p>هذا أمر ${cat==='chatgpt'?'ChatGPT':'Midjourney'} متخصص للمهمة رقم ${i}. يمكنك تخصيصه حسب احتياجاتك.</p><h2>💡 نصائح:</h2><ul><li>خصص الأمر حسب احتياجاتك</li><li>استخدم الكلمات المفتاحية المناسبة</li><li>جرّب إضافات مختلفة لتحسين النتيجة</li></ul><h2>🎯 مثال:</h2><p>استبدل [الموضوع] بموضوعك الفعلي مثل 'التسويق الرقمي' أو 'تصميم شعار'.</p>`,
        explanationEn: `<h2>📖 Explanation:</h2><p>This is a ${cat==='chatgpt'?'ChatGPT':'Midjourney'} prompt for task #${i}. You can customize it to your needs.</p><h2>💡 Tips:</h2><ul><li>Customize the prompt to your needs</li><li>Use appropriate keywords</li><li>Try different variations to improve results</li></ul><h2>🎯 Example:</h2><p>Replace [topic] with your actual topic like 'digital marketing' or 'logo design'.</p>`
    };
}
const urlParams=new URLSearchParams(window.location.search);
const promptId=urlParams.get('id');
const prompt=prompts[promptId]||prompts[1];
let lang=localStorage.getItem('lang')||'ar';
function toggleLanguage(){lang=lang==='ar'?'en':'ar';localStorage.setItem('lang',lang);document.body.classList.toggle('en',lang==='en');document.getElementById('langBtn').textContent=lang==='ar'?'English':'عربي';updateContent();}
function updateContent(){const isEn=lang==='en';document.getElementById('titleAr').style.display=isEn?'none':'block';document.getElementById('titleEn').style.display=isEn?'block':'none';document.getElementById('promptAr').style.display=isEn?'none':'block';document.getElementById('promptEn').style.display=isEn?'block':'none';document.getElementById('explanationAr').style.display=isEn?'none':'block';document.getElementById('explanationEn').style.display=isEn?'block':'none';if(isEn){document.getElementById('titleEn').innerText=prompt.titleEn;document.getElementById('promptEn').innerText=prompt.textEn;document.getElementById('explanationEn').innerHTML=prompt.explanationEn;}else{document.getElementById('titleAr').innerText=prompt.titleAr;document.getElementById('promptAr').innerText=prompt.textAr;document.getElementById('explanationAr').innerHTML=prompt.explanationAr;}}
function copyPrompt(){const isEn=lang==='en';const text=isEn?prompt.textEn:prompt.textAr;navigator.clipboard.writeText(text);alert(isEn?'✅ Prompt copied!':'✅ تم نسخ الأمر!');}
updateContent();
</script>
</body>
</html>
