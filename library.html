<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المكتبة | MindWeave</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.lang-switch{background:#1A1A2E;border:1px solid #6C5CE7;padding:6px 12px;border-radius:30px;cursor:pointer;color:white}
[data-lang="en"]{display:none}body.en [data-lang="ar"]{display:none}body.en [data-lang="en"]{display:block}
body.en{direction:ltr;text-align:left}body:not(.en){direction:rtl;text-align:right}
.page-header{padding:120px 0 40px;text-align:center;background:linear-gradient(135deg,#0A0A0F,#1A1A2E)}
.prompt-card{background:#1A1A2E;border-radius:15px;padding:1.5rem;margin-bottom:1rem;border:1px solid rgba(108,92,231,0.2)}
.prompt-category{color:#6C5CE7;font-size:0.8rem}
.prompt-text{margin:1rem 0}
.btn-copy{background:#6C5CE7;color:white;border:none;padding:8px 16px;border-radius:25px;cursor:pointer}
.filter-buttons{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:2rem}
.filter-btn{background:#1A1A2E;border:1px solid #6C5CE7;padding:8px 20px;border-radius:30px;cursor:pointer;color:white}
.filter-btn.active{background:#6C5CE7}
</style>
</head>
<body>
<header><nav><div class="logo"><a href="index.html">🧠 MindWeave</a></div>
<ul class="nav-menu">
<li><a href="index.html" data-lang="ar">الرئيسية</a><a href="index.html" data-lang="en">Home</a></li>
<li><a href="library.html" data-lang="ar">المكتبة</a><a href="library.html" data-lang="en">Library</a></li>
<li><a href="blog.html" data-lang="ar">المدونة</a><a href="blog.html" data-lang="en">Blog</a></li>
<li><a href="store.html" data-lang="ar">المتجر</a><a href="store.html" data-lang="en">Store</a></li>
<li><a href="community.html" data-lang="ar">المجتمع</a><a href="community.html" data-lang="en">Community</a></li>
<li><a href="about.html" data-lang="ar">من نحن</a><a href="about.html" data-lang="en">About</a></li>
<li><a href="contact.html" data-lang="ar">اتصل بنا</a><a href="contact.html" data-lang="en">Contact</a></li>
</ul>
<div><button class="lang-switch" onclick="toggleLanguage()" id="langBtn">English</button></div>
</nav></header>

<main>
<section class="page-header"><div class="container"><h1 data-lang="ar">مكتبة الأوامر المجانية</h1><h1 data-lang="en">Free Prompts Library</h1><p data-lang="ar">أكثر من 500 أمر لـ ChatGPT و Midjourney</p><p data-lang="en">500+ prompts for ChatGPT and Midjourney</p></div></section>
<section class="library-filters"><div class="container"><div class="filter-buttons" id="filterBtns"></div></div></section>
<section class="prompts-list"><div class="container"><div id="promptsContainer"></div><button id="loadMore" class="btn-primary" style="margin:2rem auto;display:block">عرض المزيد</button></div></section>
</main>
<footer><div class="container"><div class="footer-bottom"><p>© 2026 MindWeave</p></div></div></footer>

<script>
const allPrompts = [
    {text:"اكتب لي خطة تسويق لمنتج جديد",textEn:"Write a marketing plan for a new product",cat:"chatgpt"},
    {text:"/imagine prompt minimalist logo for tech startup, blue and white",textEn:"/imagine prompt minimalist logo for tech startup, blue and white",cat:"midjourney"},
    {text:"حلل هذا النص واستخرج الأفكار الرئيسية",textEn:"Analyze this text and extract key ideas",cat:"chatgpt"},
    {text:"/imagine prompt futuristic cityscape, cyberpunk, neon lights",textEn:"/imagine prompt futuristic cityscape, cyberpunk, neon lights",cat:"midjourney"}
];
let currentFilter="all", displayCount=4;
function toggleLanguage(){document.body.classList.toggle('en');let lang=document.body.classList.contains('en')?'en':'ar';localStorage.setItem('lang',lang);document.getElementById('langBtn').textContent=lang=='ar'?'English':'عربي';renderPrompts();}
function renderPrompts(){let filtered=currentFilter=="all"?allPrompts:allPrompts.filter(p=>p.cat==currentFilter);let toShow=filtered.slice(0,displayCount);let isEn=document.body.classList.contains('en');document.getElementById('promptsContainer').innerHTML=toShow.map(p=>`<div class="prompt-card"><div class="prompt-category">${p.cat=='chatgpt'?'💬 ChatGPT':'🎨 Midjourney'}</div><p class="prompt-text">${isEn?p.textEn:p.text}</p><button class="btn-copy" onclick="navigator.clipboard.writeText('${(isEn?p.textEn:p.text).replace(/'/g,"\\'")}');alert('Copied!')">📋 Copy</button></div>`).join('');document.getElementById('loadMore').style.display=displayCount>=filtered.length?'none':'block';}
document.getElementById('loadMore').onclick=()=>{displayCount+=4;renderPrompts();};
let cats=[{id:"all",ar:"كل الأوامر",en:"All Prompts"},{id:"chatgpt",ar:"ChatGPT",en:"ChatGPT"},{id:"midjourney",ar:"Midjourney",en:"Midjourney"}];
document.getElementById('filterBtns').innerHTML=cats.map(c=>`<button class="filter-btn ${c.id==currentFilter?'active':''}" data-filter="${c.id}" data-lang="ar">${c.ar}</button><button class="filter-btn ${c.id==currentFilter?'active':''}" data-filter="${c.id}" data-lang="en">${c.en}</button>`).join('');
document.querySelectorAll('.filter-btn').forEach(btn=>{btn.onclick=()=>{currentFilter=btn.dataset.filter;displayCount=4;renderPrompts();document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll(`.filter-btn[data-filter="${currentFilter}"]`).forEach(b=>b.classList.add('active'));}});
if(localStorage.getItem('lang')=='en')document.body.classList.add('en');document.getElementById('langBtn').textContent=localStorage.getItem('lang')=='en'?'عربي':'English';
renderPrompts();
</script>
</body>
</html>
