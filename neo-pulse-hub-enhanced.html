<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="متجر Neo Pulse Hub الذكي - أحدث المنتجات التقنية والأجهزة الذكية">
    <meta name="keywords" content="ساعات ذكية, سماعات, المنزل الذكي, تقنية, أجهزة ذكية">
    <meta name="author" content="Neo Pulse Hub">
    <meta property="og:title" content="Neo Pulse Hub | متجر التقنية الذكية">
    <meta property="og:description" content="اكتشف أحدث الأجهزة الذكية والمنتجات التقنية">
    <meta property="og:type" content="website">
    <title>Neo Pulse Hub | متجر التقنية الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #00d2ff;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ff9900;
            --light: #f0f2f5;
            --dark: #1a1a2e;
            --text: #333;
            --text-light: #666;
            --border: #eee;
        }

        body {
            background-color: var(--light);
            color: var(--text);
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background-color: #0f0f1e;
            color: #e0e0e0;
            --light: #1a1a2e;
            --text: #e0e0e0;
            --text-light: #b0b0b0;
            --border: #333;
        }

        body.en { direction: ltr; }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .logo:hover { transform: scale(1.05); }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-icon {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: var(--accent);
            color: var(--primary);
        }

        .lang-btn, .theme-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
        }

        .lang-btn:hover, .theme-btn:hover {
            background: var(--accent);
            color: var(--primary);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex: 1;
            max-width: 600px;
        }

        .search-box, .filter-box {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            font-family: 'Tajawal', sans-serif;
            background: white;
            color: var(--text);
        }

        body.dark-mode .search-box,
        body.dark-mode .filter-box {
            background: #2a2a3e;
            color: #e0e0e0;
            border: 1px solid #444;
        }

        .search-box { flex: 2; }

        /* ===== CART BADGE ===== */
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        body.en .cart-badge { right: auto; left: -8px; }

        /* ===== PRODUCTS GRID ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 0;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body.dark-mode .product-card {
            background: #1a1a2e;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,210,255,0.2);
        }

        .card-image {
            position: relative;
            height: 220px;
            background: #f9f9f9;
            overflow: hidden;
        }

        body.dark-mode .card-image { background: #2a2a3e; }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
            loading: lazy;
        }

        .product-card:hover .card-image img { transform: scale(1.08); }

        .badge, .discount-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            animation: slideIn 0.5s ease;
        }

        body.en .badge { right: auto; left: 15px; }

        .discount-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--success);
        }

        body.en .discount-badge { left: auto; right: 15px; }

        .wishlist-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.9);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.en .wishlist-btn { right: auto; left: 15px; }

        .wishlist-btn:hover {
            background: var(--danger);
            color: white;
            transform: scale(1.1);
        }

        .wishlist-btn.active { color: var(--danger); }

        .compare-btn {
            position: absolute;
            top: 60px;
            right: 15px;
            background: rgba(255,255,255,0.9);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.en .compare-btn { right: auto; left: 15px; }

        .compare-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .compare-btn.active { background: var(--accent); color: white; }

        /* ===== CARD BODY ===== */
        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .category-tag {
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
            min-height: 50px;
            color: var(--text);
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            color: var(--text-light);
        }

        .stars { color: #ffa502; }

        .price-section {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            margin-bottom: 15px;
        }

        .price-original {
            text-decoration: line-through;
            color: var(--text-light);
            font-size: 14px;
            margin-left: 10px;
        }

        body.en .price-original { margin-left: 0; margin-right: 10px; }

        .price-current {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .buy-btn {
            flex: 1;
            padding: 12px;
            background: var(--warning);
            color: #111;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .buy-btn:hover {
            background: #e68a00;
            transform: translateY(-2px);
        }

        .cart-btn {
            flex: 1;
            padding: 12px;
            background: var(--accent);
            color: var(--primary);
            text-align: center;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .cart-btn:hover {
            background: #00b8d4;
            transform: translateY(-2px);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 20px;
            padding: 50px;
            color: var(--text-light);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 350px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            z-index: 200;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        body.en .sidebar { right: auto; left: 0; transform: translateX(-100%); }

        .sidebar.active { transform: translateX(0); }

        body.en .sidebar.active { transform: translateX(0); }

        body.dark-mode .sidebar {
            background: #1a1a2e;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-close {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .sidebar-content {
            padding: 20px;
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .cart-item, .wishlist-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: var(--light);
            border-radius: 8px;
            align-items: center;
        }

        body.dark-mode .cart-item,
        body.dark-mode .wishlist-item {
            background: #2a2a3e;
        }

        .item-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .item-price {
            color: var(--accent);
            font-weight: bold;
        }

        .item-remove {
            background: var(--danger);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .item-remove:hover { transform: scale(1.1); }

        .empty-message {
            text-align: center;
            color: var(--text-light);
            padding: 20px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
            background: white;
        }

        body.dark-mode .sidebar-footer {
            background: #1a1a2e;
            border-top-color: #333;
        }

        .total-price {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: var(--warning);
            color: #111;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkout-btn:hover { background: #e68a00; }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ===== MODAL ===== */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 300;
            max-width: 500px;
            width: 90%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        body.dark-mode .modal { background: #1a1a2e; }

        .modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }

        body.en .modal-close { right: auto; left: 15px; }

        .modal h2 {
            margin-bottom: 20px;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            background: white;
            color: var(--text);
        }

        body.dark-mode .form-group input,
        body.dark-mode .form-group textarea {
            background: #2a2a3e;
            border-color: #444;
            color: #e0e0e0;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover { background: #00b8d4; }

        /* ===== ANIMATIONS ===== */
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse { animation: pulse 2s infinite; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .sidebar {
                width: 100%;
            }

            .top-section {
                flex-direction: column;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
                max-width: 100%;
            }

            .header-controls {
                width: 100%;
            }
        }

        /* ===== NOTIFICATION ===== */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
            z-index: 400;
        }

        body.en .notification { right: auto; left: 20px; }

        .notification.error { background: var(--danger); }
        .notification.warning { background: var(--warning); }
        .notification.info { background: var(--accent); }
    </style>
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <div class="top-section">
                <div class="logo" onclick="window.location.reload()">
                    <i class="fas fa-pulse"></i> Neo Pulse Hub
                </div>
                <div class="header-controls">
                    <button id="themeToggle" class="theme-btn" title="تبديل الوضع المظلم">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="langToggle" class="lang-btn">English</button>
                    <button id="cartToggle" class="btn-icon" title="السلة">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cartCount">0</span>
                    </button>
                    <button id="wishlistToggle" class="btn-icon" title="المفضلة">
                        <i class="fas fa-heart"></i>
                        <span class="cart-badge" id="wishlistCount">0</span>
                    </button>
                    <button id="compareToggle" class="btn-icon" title="المقارنة">
                        <i class="fas fa-code-branch"></i>
                    </button>
                </div>
            </div>
            <div class="controls">
                <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن منتج...">
                <select id="categoryFilter" class="filter-box">
                    <option value="all">جميع الأقسام</option>
                    <option value="smartwatch">ساعات ذكية</option>
                    <option value="earbuds">سماعات ذكية</option>
                    <option value="smart-home">المنزل الذكي</option>
                    <option value="health">الصحة الذكية</option>
                    <option value="smart-glasses">نظارات و كاميرات</option>
                    <option value="productivity">الإنتاجية</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="products-grid" id="productsContainer">
            <!-- المنتجات تظهر هنا -->
        </div>
    </main>

    <!-- SIDEBAR CART -->
    <div class="sidebar" id="cartSidebar">
        <div class="sidebar-header">
            <h2 id="cartTitle">سلة التسوق</h2>
            <button class="sidebar-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-section">
                <div id="cartItems"></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="total-price" id="totalPrice">المجموع: $0</div>
            <button class="checkout-btn" id="checkoutBtn">إتمام الشراء</button>
        </div>
    </div>

    <!-- SIDEBAR WISHLIST -->
    <div class="sidebar" id="wishlistSidebar">
        <div class="sidebar-header">
            <h2 id="wishlistTitle">المفضلة</h2>
            <button class="sidebar-close" onclick="toggleWishlist()">✕</button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-section">
                <div id="wishlistItems"></div>
            </div>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="closeAllSidebars()"></div>

    <!-- CONTACT MODAL -->
    <div class="modal" id="contactModal">
        <button class="modal-close" onclick="closeModal('contactModal')">✕</button>
        <h2 id="contactTitle">اتصل بنا</h2>
        <form id="contactForm">
            <div class="form-group">
                <label for="name" id="nameLabel">الاسم</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email" id="emailLabel">البريد الإلكتروني</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="message" id="messageLabel">الرسالة</label>
                <textarea id="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="submit-btn" id="sendBtn">إرسال</button>
        </form>
    </div>

    <script>
        let currentLang = 'ar';
        let darkMode = localStorage.getItem('darkMode') === 'true';
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        let compareList = JSON.parse(localStorage.getItem('compareList')) || [];

        // تطبيق الوضع المظلم
        if (darkMode) {
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
        }

        // === قاعدة بيانات المنتجات الكاملة (50 منتج) ===
        const products = [
            {
                "id": "NPH-001", "name": { "ar": "Apple Watch Series 9 - 45 ملم", "en": "Apple Watch Series 9 45mm GPS" },
                "category": "smartwatch", "category_ar": "ساعات ذكية", "category_en": "Smart Watches",
                "price": 399, "original_price": 449, "discount": 11, "rating": 4.8, "reviews": 12430,
                "image": "https://images.unsplash.com/photo-1551816230-ef5deaed4a26?w=600&q=80",
                "badge": { "ar": "الأكثر مبيعاً", "en": "Best Seller" },
                "affiliate_amazon": "https://www.amazon.com/dp/B0CHX8SZQS?tag=neopulsehub-20"
            },
            {
                "id": "NPH-002", "name": { "ar": "سامسونج Galaxy Watch 6 Classic - 47 ملم", "en": "Samsung Galaxy Watch 6 Classic 47mm" },
                "category": "smartwatch", "category_ar": "ساعات ذكية", "category_en": "Smart Watches",
                "price": 299, "original_price": 349, "discount": 14, "rating": 4.7, "reviews": 8920,
                "image": "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80",
                "badge": { "ar": "جديد", "en": "New" },
                "affiliate_amazon": "https://www.amazon.com/dp/B0C797YFCF?tag=neopulsehub-20"

        // دالة للحصول على النجوم
        function getStars(rating) {
            const fullStars = Math.floor(rating);
            const hasHalf = rating % 1 !== 0;
            let stars = '';
            for (let i = 0; i < fullStars; i++) stars += '★';
            if (hasHalf) stars += '½';
            return `<span class="stars">${stars}</span>`;
        }

        // عرض المنتجات
        function displayProducts(productsToDisplay) {
            const container = document.getElementById('productsContainer');
            if (productsToDisplay.length === 0) {
                container.innerHTML = `<div class="no-results">${currentLang === 'ar' ? 'عذراً، لا توجد منتجات تطابق بحثك.' : 'Sorry, no products match your search.'}</div>`;
                return;
            }

            container.innerHTML = productsToDisplay.map(p => {
                const inCart = cart.some(item => item.id === p.id);
                const inWishlist = wishlist.some(item => item.id === p.id);
                const inCompare = compareList.some(item => item.id === p.id);
                
                return `
                    <div class="product-card">
                        <div class="card-image">
                            <img src="${p.image}" alt="${p.name[currentLang]}" loading="lazy">
                            ${p.badge ? `<div class="badge">${p.badge[currentLang]}</div>` : ''}
                            ${p.discount > 0 ? `<div class="discount-badge">${currentLang === 'ar' ? 'وفّر' : 'Save'} ${p.discount}%</div>` : ''}
                            <button class="wishlist-btn ${inWishlist ? 'active' : ''}" onclick="toggleWishlist('${p.id}')">
                                <i class="fas fa-heart"></i>
                            </button>
                            <button class="compare-btn ${inCompare ? 'active' : ''}" onclick="toggleCompare('${p.id}')">
                                <i class="fas fa-code-branch"></i>
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="category-tag">${currentLang === 'ar' ? p.category_ar : p.category_en}</div>
                            <h3 class="product-name">${p.name[currentLang]}</h3>
                            <div class="rating">
                                ${getStars(p.rating)}
                                <span>(${p.reviews.toLocaleString()} ${currentLang === 'ar' ? 'تقييم' : 'reviews'})</span>
                            </div>
                            <div class="price-section">
                                <span class="price-current">$${p.price}</span>
                                ${p.original_price > p.price ? `<span class="price-original">$${p.original_price}</span>` : ''}
                            </div>
                            <div class="action-buttons">
                                <button class="cart-btn" onclick="addToCart('${p.id}')">
                                    <i class="fas fa-shopping-cart"></i> ${currentLang === 'ar' ? 'أضف' : 'Add'}
                                </button>
                                <a href="${p.affiliate_amazon}" target="_blank" rel="noopener noreferrer" class="buy-btn">
                                    🛒 ${currentLang === 'ar' ? 'شراء' : 'Buy'}
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // تصفية المنتجات
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.getElementById('categoryFilter').value;

            const filtered = products.filter(p => {
                const matchesName = p.name.ar.toLowerCase().includes(searchTerm) || p.name.en.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'all' || p.category === selectedCategory;
                return matchesName && matchesCategory;
            });
            displayProducts(filtered);
        }

        // إضافة إلى السلة
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                const existingItem = cart.find(item => item.id === productId);
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    cart.push({...product, quantity: 1});
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartUI();
                showNotification(currentLang === 'ar' ? 'تمت الإضافة إلى السلة' : 'Added to cart', 'success');
            }
        }

        // إزالة من السلة
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }

        // تحديث واجهة السلة
        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.length;
            const cartItems = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItems.innerHTML = `<div class="empty-message">${currentLang === 'ar' ? 'السلة فارغة' : 'Cart is empty'}</div>`;
                document.getElementById('totalPrice').textContent = `${currentLang === 'ar' ? 'المجموع' : 'Total'}: $0`;
            } else {
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name[currentLang]}" class="item-image">
                        <div class="item-info">
                            <div class="item-name">${item.name[currentLang]}</div>
                            <div class="item-price">$${item.price} × ${item.quantity}</div>
                        </div>
                        <button class="item-remove" onclick="removeFromCart('${item.id}')">✕</button>
                    </div>
                `).join('');
                document.getElementById('totalPrice').textContent = `${currentLang === 'ar' ? 'المجموع' : 'Total'}: $${total}`;
            }
        }

        // تبديل المفضلة
        function toggleWishlist(productId) {
            const index = wishlist.findIndex(item => item.id === productId);
            if (index > -1) {
                wishlist.splice(index, 1);
            } else {
                const product = products.find(p => p.id === productId);
                wishlist.push(product);
            }
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            updateWishlistUI();
            filterProducts();
        }

        // تحديث واجهة المفضلة
        function updateWishlistUI() {
            document.getElementById('wishlistCount').textContent = wishlist.length;
            const wishlistItems = document.getElementById('wishlistItems');
            
            if (wishlist.length === 0) {
                wishlistItems.innerHTML = `<div class="empty-message">${currentLang === 'ar' ? 'لا توجد عناصر مفضلة' : 'No favorites yet'}</div>`;
            } else {
                wishlistItems.innerHTML = wishlist.map(item => `
                    <div class="wishlist-item">
                        <img src="${item.image}" alt="${item.name[currentLang]}" class="item-image">
                        <div class="item-info">
                            <div class="item-name">${item.name[currentLang]}</div>
                            <div class="item-price">$${item.price}</div>
                        </div>
                        <button class="item-remove" onclick="toggleWishlist('${item.id}')">✕</button>
                    </div>
                `).join('');
            }
        }

        // تبديل المقارنة
        function toggleCompare(productId) {
            const index = compareList.findIndex(item => item.id === productId);
            if (index > -1) {
                compareList.splice(index, 1);
            } else {
                if (compareList.length >= 4) {
                    showNotification(currentLang === 'ar' ? 'يمكنك مقارنة 4 منتجات فقط' : 'You can compare up to 4 products', 'warning');
                    return;
                }
                const product = products.find(p => p.id === productId);
                compareList.push(product);
            }
            localStorage.setItem('compareList', JSON.stringify(compareList));
            filterProducts();
        }

        // إظهار الإشعارات
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // تبديل السايدبار
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleWishlistSidebar() {
            document.getElementById('wishlistSidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleWishlistBtn() {
            toggleWishlistSidebar();
        }

        function closeAllSidebars() {
            document.getElementById('cartSidebar').classList.remove('active');
            document.getElementById('wishlistSidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // تبديل اللغة
        document.getElementById('langToggle').addEventListener('click', function() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const isEn = currentLang === 'en';
            
            document.documentElement.lang = currentLang;
            document.body.classList.toggle('en', isEn);
            this.textContent = isEn ? 'عربي' : 'English';
            document.getElementById('searchInput').placeholder = isEn ? "Search for a product..." : "ابحث عن منتج...";
            
            // تحديث النصوص
            updateLanguageTexts();
            filterProducts();
        });

        // تحديث نصوص اللغة
        function updateLanguageTexts() {
            const texts = {
                ar: {
                    cartTitle: 'سلة التسوق',
                    wishlistTitle: 'المفضلة',
                    contactTitle: 'اتصل بنا',
                    nameLabel: 'الاسم',
                    emailLabel: 'البريد الإلكتروني',
                    messageLabel: 'الرسالة',
                    sendBtn: 'إرسال',
                    checkoutBtn: 'إتمام الشراء'
                },
                en: {
                    cartTitle: 'Shopping Cart',
                    wishlistTitle: 'Wishlist',
                    contactTitle: 'Contact Us',
                    nameLabel: 'Name',
                    emailLabel: 'Email',
                    messageLabel: 'Message',
                    sendBtn: 'Send',
                    checkoutBtn: 'Checkout'
                }
            };

            const lang = texts[currentLang];
            document.getElementById('cartTitle').textContent = lang.cartTitle;
            document.getElementById('wishlistTitle').textContent = lang.wishlistTitle;
            document.getElementById('contactTitle').textContent = lang.contactTitle;
            document.getElementById('nameLabel').textContent = lang.nameLabel;
            document.getElementById('emailLabel').textContent = lang.emailLabel;
            document.getElementById('messageLabel').textContent = lang.messageLabel;
            document.getElementById('sendBtn').textContent = lang.sendBtn;
            document.getElementById('checkoutBtn').textContent = lang.checkoutBtn;
        }

        // تبديل الوضع المظلم
        document.getElementById('themeToggle').addEventListener('click', function() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', darkMode);
            this.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // معالج نموذج الاتصال
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            
            showNotification(currentLang === 'ar' ? 'تم إرسال الرسالة بنجاح!' : 'Message sent successfully!', 'success');
            this.reset();
            closeModal('contactModal');
        });

        // فتح وإغلاق المودال
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // معالجات الأحداث
        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('cartToggle').addEventListener('click', toggleCart);
        document.getElementById('wishlistToggle').addEventListener('click', toggleWishlistSidebar);

        // العرض الأولي
        displayProducts(products);
        updateCartUI();
        updateWishlistUI();
        updateLanguageTexts();
    </script>
