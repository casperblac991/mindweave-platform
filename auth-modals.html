<!-- 
    MindWeave Authentication Modals
    Add these modals to your index.html before the closing </body> tag
-->

<!-- Auth Modal -->
<div id="authModal" class="modal" style="display: none;">
    <div class="modal-content auth-modal">
        <span class="close-btn" onclick="closeAuthModal()">&times;</span>
        
        <h2 id="authTitle">تسجيل الدخول</h2>
        
        <form id="authForm" class="auth-form">
            <!-- Full Name Field (hidden by default, shown for signup) -->
            <div id="fullNameField" style="display: none;">
                <label for="authFullName">الاسم الكامل</label>
                <input 
                    type="text" 
                    id="authFullName" 
                    placeholder="أدخل اسمك الكامل" 
                    required
                >
            </div>
            
            <!-- Email Field -->
            <div>
                <label for="authEmail">البريد الإلكتروني</label>
                <input 
                    type="email" 
                    id="authEmail" 
                    placeholder="your@email.com" 
                    required
                >
            </div>
            
            <!-- Password Field -->
            <div>
                <label for="authPassword">كلمة المرور</label>
                <input 
                    type="password" 
                    id="authPassword" 
                    placeholder="أدخل كلمة المرور" 
                    required
                >
            </div>
            
            <!-- Submit Button -->
            <button type="submit" id="authSubmitBtn" class="btn-primary">
                دخول
            </button>
        </form>
        
        <!-- Toggle Auth Mode -->
        <p id="toggleAuthMode" class="auth-toggle">
            ليس لديك حساب؟ <a href="#" onclick="showAuthModal('signup')">إنشاء حساب</a>
        </p>
    </div>
</div>

<!-- Newsletter Modal (Optional) -->
<div id="newsletterModal" class="modal" style="display: none;">
    <div class="modal-content newsletter-modal">
        <span class="close-btn" onclick="closeNewsletterModal()">&times;</span>
        
        <h2>اشترك في النشرة البريدية</h2>
        <p>احصل على آخر التحديثات والمنتجات الجديدة مباشرة في بريدك الإلكتروني</p>
        
        <form id="newsletterForm" class="newsletter-form">
            <input 
                type="email" 
                id="newsletterEmail" 
                placeholder="أدخل بريدك الإلكتروني" 
                required
            >
            <button type="submit" class="btn-primary">اشترك الآن</button>
        </form>
    </div>
</div>

<!-- CSS Styles for Modals -->
<style>
    /* Modal Styles */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
    }

    .modal-content {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border-radius: 15px;
        padding: 40px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 28px;
        font-weight: bold;
        color: #fff;
        cursor: pointer;
        transition: color 0.3s ease;
    }

    .close-btn:hover {
        color: #00d4ff;
    }

    /* Auth Form Styles */
    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin: 20px 0;
    }

    .auth-form div {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .auth-form label {
        color: #00d4ff;
        font-weight: 600;
        font-size: 14px;
    }

    .auth-form input {
        padding: 12px;
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 8px;
        background-color: rgba(0, 0, 0, 0.3);
        color: #fff;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    .auth-form input:focus {
        outline: none;
        border-color: #00d4ff;
        background-color: rgba(0, 212, 255, 0.1);
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .auth-form input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    /* Button Styles */
    .modal-content .btn-primary {
        padding: 12px;
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        color: #000;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 16px;
    }

    .modal-content .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
    }

    .modal-content .btn-primary:active {
        transform: translateY(0);
    }

    /* Auth Toggle */
    .auth-toggle {
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        margin-top: 15px;
    }

    .auth-toggle a {
        color: #00d4ff;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .auth-toggle a:hover {
        color: #00ffff;
        text-decoration: underline;
    }

    /* Newsletter Modal */
    .newsletter-modal h2 {
        color: #00d4ff;
        margin-bottom: 10px;
    }

    .newsletter-modal p {
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 20px;
        font-size: 14px;
    }

    .newsletter-form {
        display: flex;
        gap: 10px;
    }

    .newsletter-form input {
        flex: 1;
        padding: 12px;
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 8px;
        background-color: rgba(0, 0, 0, 0.3);
        color: #fff;
        font-size: 14px;
    }

    .newsletter-form input:focus {
        outline: none;
        border-color: #00d4ff;
        background-color: rgba(0, 212, 255, 0.1);
    }

    .newsletter-form button {
        padding: 12px 20px;
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        color: #000;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
    }

    .newsletter-form button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
    }

    /* Responsive Design */
    @media (max-width: 600px) {
        .modal-content {
            padding: 30px 20px;
            max-width: 95%;
        }

        .auth-form {
            gap: 15px;
        }

        .newsletter-form {
            flex-direction: column;
        }

        .newsletter-form button {
            width: 100%;
        }
    }

    /* Auth Buttons in Header */
    #authButtons {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .btn-login, .btn-signup, .btn-logout {
        padding: 8px 16px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        font-size: 14px;
    }

    .btn-login {
        background-color: transparent;
        color: #00d4ff;
        border: 1px solid #00d4ff;
    }

    .btn-login:hover {
        background-color: rgba(0, 212, 255, 0.1);
    }

    .btn-signup {
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        color: #000;
    }

    .btn-signup:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    .btn-logout {
        background-color: #ff4444;
        color: #fff;
    }

    .btn-logout:hover {
        background-color: #cc0000;
    }
</style>

<!-- JavaScript Helper Functions -->
<script>
    /**
     * Close newsletter modal
     */
    function closeNewsletterModal() {
        const modal = document.getElementById('newsletterModal');
        if (modal) {
            modal.style.display = 'none';
        }
    }

    /**
     * Show newsletter modal
     */
    function showNewsletterModal() {
        const modal = document.getElementById('newsletterModal');
        if (modal) {
            modal.style.display = 'flex';
        }
    }

    /**
     * Close modal when clicking outside of it
     */
    window.addEventListener('click', (event) => {
        const authModal = document.getElementById('authModal');
        const newsletterModal = document.getElementById('newsletterModal');

        if (event.target === authModal) {
            closeAuthModal();
        }
        if (event.target === newsletterModal) {
            closeNewsletterModal();
        }
    });

    /**
     * Prevent form submission when pressing Enter on input
     */
    document.addEventListener('DOMContentLoaded', () => {
        const inputs = document.querySelectorAll('.auth-form input, .newsletter-form input');
        inputs.forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    const form = e.target.closest('form');
                    if (form) {
                        form.dispatchEvent(new Event('submit'));
                    }
                }
            });
        });
    });
</script>
